kind = "web"
previewPath = "/putitup-business/"
title = "PUTITUP Business"
version = "1.0.0"
id = "artifacts/putitup-business"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/putitup-business/" ]
localPort = 25785

[services.development]
run = "pnpm --filter @workspace/putitup-business run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/putitup-business", "run", "build" ]
publicDir = "artifacts/putitup-business/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25785"
BASE_PATH = "/putitup-business/"
